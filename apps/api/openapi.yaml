openapi: 3.0.3
info:
  title: C3 Web V0 API
  version: 0.1.0
  description: People + AddPerson governed vertical slice.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas: {}
paths:
  /health:
    get:
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required:
                  - status
                additionalProperties: false
  /ready:
    get:
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required:
                  - status
                additionalProperties: false
        "503":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required:
                  - status
                additionalProperties: false
  /api/v1/me:
    get:
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  identity:
                    type: string
                  displayName:
                    type: string
                  role:
                    type: string
                    enum:
                      - owner
                      - operations
                      - legal
                      - finance
                      - hr
                      - management
                      - visitor
                  tenantSlug:
                    type: string
                  capabilities:
                    type: object
                    properties:
                      canReadPeople:
                        type: boolean
                      canSubmitApproval:
                        type: boolean
                      canReviewApproval:
                        type: boolean
                      canExecuteApproval:
                        type: boolean
                    required:
                      - canReadPeople
                      - canSubmitApproval
                      - canReviewApproval
                      - canExecuteApproval
                    additionalProperties: false
                required:
                  - identity
                  - displayName
                  - role
                  - tenantSlug
                  - capabilities
                additionalProperties: false
  /api/v1/people:
    get:
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  people:
                    type: array
                    items:
                      type: object
                      properties:
                        personId:
                          type: string
                        fullName:
                          type: string
                        ign:
                          type: string
                          nullable: true
                        nationality:
                          type: string
                          nullable: true
                        primaryRole:
                          type: string
                          nullable: true
                        personnelCode:
                          type: string
                          nullable: true
                        currentTeam:
                          type: string
                          nullable: true
                        currentGameTitle:
                          type: string
                          nullable: true
                        primaryDepartment:
                          type: string
                          nullable: true
                        notes:
                          type: string
                          nullable: true
                        isActive:
                          type: boolean
                        version:
                          type: integer
                        createdAt:
                          type: string
                        updatedAt:
                          type: string
                      required:
                        - personId
                        - fullName
                        - ign
                        - nationality
                        - primaryRole
                        - personnelCode
                        - currentTeam
                        - currentGameTitle
                        - primaryDepartment
                        - notes
                        - isActive
                        - version
                        - createdAt
                        - updatedAt
                      additionalProperties: false
                required:
                  - people
                additionalProperties: false
  /api/v1/people/{personId}:
    get:
      parameters:
        - schema:
            type: string
            pattern: ^PER-\d{4,}$
          in: path
          name: personId
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  person:
                    type: object
                    properties:
                      personId:
                        type: string
                      fullName:
                        type: string
                      ign:
                        type: string
                        nullable: true
                      nationality:
                        type: string
                        nullable: true
                      primaryRole:
                        type: string
                        nullable: true
                      personnelCode:
                        type: string
                        nullable: true
                      currentTeam:
                        type: string
                        nullable: true
                      currentGameTitle:
                        type: string
                        nullable: true
                      primaryDepartment:
                        type: string
                        nullable: true
                      notes:
                        type: string
                        nullable: true
                      isActive:
                        type: boolean
                      version:
                        type: integer
                      createdAt:
                        type: string
                      updatedAt:
                        type: string
                    required:
                      - personId
                      - fullName
                      - ign
                      - nationality
                      - primaryRole
                      - personnelCode
                      - currentTeam
                      - currentGameTitle
                      - primaryDepartment
                      - notes
                      - isActive
                      - version
                      - createdAt
                      - updatedAt
                    additionalProperties: false
