                    items:
                      type: object
                      properties:
                        entityType:
                          type: string
                        entityId:
                          type: string
                        action:
                          type: string
                        actor:
                          type: string
                        at:
                          type: string
                        before:
                          type: object
                          additionalProperties: {}
                          nullable: true
                        after:
                          type: object
                          additionalProperties: {}
                          nullable: true
                      required:
                        - entityType
                        - entityId
                        - action
                        - actor
                        - at
                        - before
                        - after
                      additionalProperties: false
                required:
