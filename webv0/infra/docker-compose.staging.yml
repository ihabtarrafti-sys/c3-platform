# C3 Web V0 — staging stack (local/containerised). NOT a production deploy:
# no external DNS, no managed database, no production Entra app. Bring up with:
#   docker compose -f infra/docker-compose.staging.yml up --build
#
# Credential separation (enforced by the API's env validation):
#   - `migrate` one-shot: DATABASE_ADMIN_URL (privileged) — creates the
#     least-privileged c3_app + SELECT-only c3_auth roles, applies migrations.
#   - `api`: DATABASE_URL (c3_app, RLS-enforced) + DATABASE_AUTH_URL (c3_auth,
#     SELECT-only membership resolution). It NEVER receives the admin URL —
#     production startup fails closed if it does.
services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: c3_admin
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD:-c3_admin_staging_pw}
      POSTGRES_DB: c3web
    volumes:
      - c3web_staging_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U c3_admin -d c3web"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build: { context: .., dockerfile: apps/api/Dockerfile }
    command: ["node", "node_modules/tsx/dist/cli.mjs", "packages/persistence/scripts/migrate.ts"]
    environment:
      DATABASE_ADMIN_URL: postgres://c3_admin:${DB_ADMIN_PASSWORD:-c3_admin_staging_pw}@postgres:5432/c3web
      DATABASE_URL: postgres://c3_app:${DB_APP_PASSWORD:-c3_app_staging_pw}@postgres:5432/c3web
      DATABASE_AUTH_URL: postgres://c3_auth:${DB_AUTH_PASSWORD:-c3_auth_staging_pw}@postgres:5432/c3web
    depends_on:
      postgres: { condition: service_healthy }

  api:
    build: { context: .., dockerfile: apps/api/Dockerfile }
    environment:
      NODE_ENV: production
      API_PORT: 4000
      # Least-privileged roles ONLY — no admin URL (env validation enforces).
      DATABASE_URL: postgres://c3_app:${DB_APP_PASSWORD:-c3_app_staging_pw}@postgres:5432/c3web
      DATABASE_AUTH_URL: postgres://c3_auth:${DB_AUTH_PASSWORD:-c3_auth_staging_pw}@postgres:5432/c3web
      AUTH_PROVIDER: entra
      ENTRA_ISSUER: ${ENTRA_ISSUER:-}
      ENTRA_AUDIENCE: ${ENTRA_AUDIENCE:-}
      ENTRA_JWKS_URI: ${ENTRA_JWKS_URI:-}
      CORS_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
      TRUST_PROXY: "false"
    ports:
      - "4000:4000"
    depends_on:
      migrate: { condition: service_completed_successfully }

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${API_ORIGIN:-http://localhost:4000}
    ports:
      - "8080:8080"
    depends_on:
      - api

volumes:
  c3web_staging_pgdata:
