# C3 Web V0 SPA — unprivileged nginx (listens on 8080, non-root).
server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── security headers ────────────────────────────────────────────────────
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  # Griffel (Fluent UI) injects runtime <style> tags -> style-src 'unsafe-inline'.
  # connect-src allows only same-origin + https (the API origin); tighten to the
  # exact API host per environment when known.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # SPA fallback: every unknown path resolves to index.html so deep links and
  # browser refresh work on /people, /people/:id, /approvals, /approvals/:id.
  location / {
    try_files $uri $uri/ /index.html;
    # The shell document must always revalidate (it references hashed assets).
    add_header Cache-Control "no-cache" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
  }

  # Hashed build assets are immutable.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
  }
}
